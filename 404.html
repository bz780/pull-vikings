<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,follow">
<title>404 — Page introuvable</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:#1f2937;background:#f8f9fa;display:flex;align-items:center;justify-content:center;line-height:1.5;padding:24px}
.box{max-width:520px;text-align:center;background:#fff;border-radius:14px;padding:48px 32px;box-shadow:0 4px 32px rgba(0,0,0,.06);border:1px solid #e5e7eb}
.code{font-size:clamp(64px,12vw,96px);font-weight:800;line-height:1;color:#111;letter-spacing:-.02em;margin-bottom:16px}
h1{font-size:clamp(20px,3vw,28px);font-weight:700;margin-bottom:14px;color:#111}
p{color:#4b5563;margin-bottom:28px;font-size:.96rem}
.btn{display:inline-block;background:#111;color:#fff;text-decoration:none;padding:13px 28px;border-radius:8px;font-weight:600;transition:transform .12s,background .15s}
.btn:hover{background:#000;transform:translateY(-1px)}
.btn-2{display:inline-block;color:#4b5563;text-decoration:none;padding:13px 16px;font-weight:500;font-size:.92rem;margin-left:8px}
.btn-2:hover{color:#111;text-decoration:underline}
</style>
</head>
<body>
<main class="box">
  <div class="code">404</div>
  <h1>Cette page n'existe pas</h1>
  <p>L'adresse demandée est introuvable. Elle a peut-être été déplacée, supprimée, ou le lien comporte une faute de frappe.</p>
  <a href="/" class="btn">Retour à l'accueil</a>
</main>
</body>
</html>
